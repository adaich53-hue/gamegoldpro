<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تفسير الأحلام</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; padding: 20px; text-align: center; }
        input { width: 80%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #ddd; font-size: 18px; }
        .result { background: white; padding: 20px; margin: 10px auto; width: 80%; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .loading { color: #555; font-style: italic; }
    </style>
</head>
<body>
    <h1>تفسير الأحلام</h1>
    <input type="text" id="dreamSearch" placeholder="اكتب ما رأيته في حلمك (مثلاً: مطر، ثعبان)...">
    <div id="dreamContent"></div>

    <script>
        document.getElementById('dreamSearch').addEventListener('input', function(e) {
            const query = e.target.value;
            if(query.length > 0) {
                document.getElementById('dreamContent').innerHTML = '<div class="loading">جاري تحميل التفسير...</div>';
                // سنربط هذا لاحقاً بقاعدة بيانات الأحلام
            } else {
                document.getElementById('dreamContent').innerHTML = '';
            }
        });
    </script>
</body>
</html>
