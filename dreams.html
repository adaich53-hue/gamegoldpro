<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تفسير الأحلام - اطمئن</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; text-align: center; padding: 10px; }
        .box { background: white; padding: 15px; border-radius: 10px; max-width: 600px; margin: auto; }
        input { width: 70%; padding: 10px; border: 2px solid #007bff; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        iframe { width: 100%; height: 500px; border: none; margin-top: 20px; background-color: white; }
    </style>
</head>
<body>

<div class="box">
    <h2>تفسير الأحلام</h2>
    <p>اكتب رمز الحلم واضغط بحث:</p>
    <input type="text" id="dreamInput" placeholder="مثال: رؤيه افعي في المنام ...">
    <button onclick="showDream()">بحث</button>
    <br>
    <!-- هنا ستظهر نافذة التفسير داخل موقعك -->
    <iframe id="dreamFrame" src=""></iframe>
    <br><br>
    <a href="index.html">العودة للرئيسية</a>
</div>

<script>
    function showDream() {
        let name = document.getElementById('dreamInput').value;
        if(name) {
            // هذا الرابط سيعرض نتائج البحث عن تفسير الحلم داخل موقعك
            document.getElementById('dreamFrame').src = 'https://www.google.com/search?q=تفسير+حلم+' + name;
        }
    }
</script>

</body>
</html>
