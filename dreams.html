<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تفسير الأحلام - اطمئن</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        .box { background: white; padding: 30px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 80%; padding: 15px; border: 2px solid #007bff; border-radius: 10px; font-size: 16px; margin-bottom: 10px; }
        button { padding: 15px 30px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h2>تفسير الأحلام</h2>
    <p>اكتب رمز الحلم (مثال: مطر، سفر):</p>
    <input type="text" id="inputVal" placeholder="اكتب الحلم هنا...">
    <br>
    <button onclick="search()">بحث</button>
    <br><br>
    <a href="index.html">العودة للرئيسية</a>
</div>
<script>
    function search() {
        let val = document.getElementById('inputVal').value;
        if(val) window.open('https://www.google.com/search?q=تفسير+حلم+' + val, '_blank');
    }
</script>
</body>
</html>
