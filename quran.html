<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>القرآن الكريم وتفسيره</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; padding: 20px; text-align: center; }
        input { width: 80%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #ccc; font-size: 18px; }
        .result { background: white; padding: 20px; margin: 10px auto; width: 80%; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .loading { color: #888; font-style: italic; }
    </style>
</head>
<body>
    <h1>القرآن الكريم</h1>
    <input type="text" id="search" placeholder="اكتب اسم السورة للبحث عنها...">
    <div id="content"></div>

    <script>
        document.getElementById('search').addEventListener('input', function(e) {
            const query = e.target.value;
            if(query.length > 0) {
                document.getElementById('content').innerHTML = '<div class="loading">جاري تحميل البيانات...</div>';
                // هنا سيتم ربط البحث مستقبلاً
            } else {
                document.getElementById('content').innerHTML = '';
            }
        });
    </script>
</body>
</html>
