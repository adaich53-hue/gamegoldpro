<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>القرآن الكريم - اطمئن</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; text-align: center; padding: 10px; }
        .box { background: white; padding: 15px; border-radius: 10px; max-width: 600px; margin: auto; }
        input { width: 70%; padding: 10px; border: 2px solid #28a745; border-radius: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        iframe { width: 100%; height: 500px; border: none; margin-top: 20px; }
    </style>
</head>
<body>
<div class="box">
    <h2>القرآن الكريم</h2>
    <input type="text" id="surahInput" placeholder="اكتب اسم السورة...">
    <button onclick="showTafsir()">عرض التفسير</button>
    <br>
    <!-- هنا ستظهر نافذة التفسير داخل موقعك -->
    <iframe id="tafsirFrame" src=""></iframe>
</div>
<script>
    function showTafsir() {
        let name = document.getElementById('surahInput').value;
        if(name) {
            // هذا الرابط يفتح موقع إسلام ويب الموثوق داخل موقعك
            document.getElementById('tafsirFrame').src = 'https://www.islamweb.net/ar/search/?q=' + name + '+تفسير';
        }
    }
</script>
</body>
</html>
